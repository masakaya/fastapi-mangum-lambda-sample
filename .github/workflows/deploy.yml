name: Deploy to Lambda

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest

  deploy:
    name: Build ZIP and Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Export production requirements
        run: uv export --no-dev --no-hashes --output-file requirements.txt

      - name: Install dependencies into package directory
        run: pip install -r requirements.txt -t package/ --no-compile --quiet

      - name: Copy source code
        run: cp -r src/ package/src/

      - name: Create deployment ZIP
        run: |
          cd package
          zip -r ../lambda.zip . -x "*.pyc" -x "*/__pycache__/*"
          cd ..
          echo "ZIP size: $(du -sh lambda.zip | cut -f1)"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda.zip \
            --no-cli-pager

      - name: Wait for Lambda update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ vars.LAMBDA_FUNCTION_NAME }}
