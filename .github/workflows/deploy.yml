name: Deploy to Lambda

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_PREFIX: dev-fastapi-mangum-lambda
  AWS_REGION: ap-northeast-1
  GITHUB_OIDC_ROLE: arn:aws:iam::121936954111:role/github-actions

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run tests
        run: uv run pytest

  deploy:
    name: Build ZIP and Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Export production requirements
        run: uv export --no-dev --no-hashes --output-file requirements.txt

      - name: Install dependencies into package directory
        run: pip install -r requirements.txt -t package/ --no-compile --quiet

      - name: Copy source code
        run: cp -r src/ package/src/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.GITHUB_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Lambda
        id: lambda-deploy
        uses: aws-actions/aws-lambda-deploy@v1
        with:
          function-name: ${{ env.RESOURCE_PREFIX }}-api-lambda
          code-artifacts-dir: package/
          handler: src.main.handler
          runtime: python3.12

      - name: Get API Gateway ID
        id: apigw
        run: |
          API_ID=$(aws apigateway get-rest-apis \
            --query "items[?name=='${{ env.RESOURCE_PREFIX }}-api-gateway'].id | [0]" \
            --output text)
          echo "api-id=$API_ID" >> "$GITHUB_OUTPUT"

      - name: Generate OpenAPI schema
        run: |
          LAMBDA_ARN=${{ steps.lambda-deploy.outputs.function-arn }} \
            uv run python scripts/generate_openapi.py > openapi.json

      - name: Update API Gateway routes
        run: |
          aws apigateway put-rest-api \
            --rest-api-id ${{ steps.apigw.outputs.api-id }} \
            --mode overwrite \
            --body fileb://openapi.json \
            --no-cli-pager

      - name: Deploy API Gateway
        run: |
          aws apigateway create-deployment \
            --rest-api-id ${{ steps.apigw.outputs.api-id }} \
            --stage-name prod \
            --no-cli-pager
